<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>다시읽기 · 독서 기록</title>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  :root{
    --paper:#f6f2e9;
    --ink:#26221c;
    --ink-soft:#6b6459;
    --line:#ddd4c2;
    --seal:#b5432f;      /* 도장 붉은색 */
    --seal-dark:#8f3220;
    --gold:#a8874e;
    --shelf:#e9e1d0;
    --ok:#3f6b4c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Serif KR",serif;
    min-height:100vh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 120px;}

  header{padding:26px 2px 14px;}
  .kicker{font-size:12px;letter-spacing:.32em;color:var(--seal);font-weight:700;text-transform:uppercase;}
  h1{
    font-size:34px;margin:6px 0 4px;font-weight:800;letter-spacing:-.01em;
    display:flex;align-items:baseline;gap:10px;
  }
  h1 .stamp{
    font-size:15px;color:#fff;background:var(--seal);
    padding:4px 9px;border-radius:4px;font-weight:700;letter-spacing:.05em;
    transform:rotate(-3deg);box-shadow:0 2px 0 var(--seal-dark);
  }
  .sub{color:var(--ink-soft);font-size:14px;line-height:1.5;}

  /* 스캔 버튼 */
  .scanbtn{
    width:100%;margin-top:18px;border:none;cursor:pointer;
    background:var(--ink);color:var(--paper);
    padding:18px;border-radius:16px;font-size:18px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:12px;
    box-shadow:0 6px 0 #14110c;transition:transform .08s,box-shadow .08s;
    font-family:inherit;
  }
  .scanbtn:active{transform:translateY(4px);box-shadow:0 2px 0 #14110c;}
  .scanbtn svg{width:24px;height:24px;}

  .manual{margin-top:12px;display:flex;gap:8px;}
  .manual input{
    flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;
    padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);
  }
  .manual input:focus{outline:none;border-color:var(--seal);}
  .manual button{
    border:1.5px solid var(--ink);background:#fff;color:var(--ink);
    border-radius:12px;padding:0 16px;font-size:15px;font-weight:700;
    font-family:inherit;cursor:pointer;
  }

  /* 카메라 오버레이 */
  .cam{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;}
  .cam.on{display:flex;}
  .cam video{width:100%;height:100%;object-fit:cover;}
  .cam .frame{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:78%;max-width:360px;height:150px;border-radius:14px;
    box-shadow:0 0 0 100vmax rgba(0,0,0,.55);
    border:2px solid rgba(255,255,255,.85);
  }
  .cam .frame::after{
    content:"";position:absolute;left:8%;right:8%;top:50%;height:2px;
    background:var(--seal);box-shadow:0 0 12px var(--seal);
    animation:scan 2s ease-in-out infinite;
  }
  @keyframes scan{0%,100%{top:20%}50%{top:80%}}
  .cam .hint{
    position:absolute;bottom:130px;left:0;right:0;text-align:center;
    color:#fff;font-size:15px;padding:0 30px;text-shadow:0 1px 4px #000;
  }
  .cam .close{
    position:absolute;top:calc(env(safe-area-inset-top) + 14px);right:16px;
    width:44px;height:44px;border-radius:50%;border:none;
    background:rgba(0,0,0,.5);color:#fff;font-size:22px;cursor:pointer;
  }

  /* 결과 카드(모달) */
  .modal{position:fixed;inset:0;z-index:120;display:none;align-items:flex-end;justify-content:center;
    background:rgba(30,26,20,.5);backdrop-filter:blur(2px);}
  .modal.on{display:flex;}
  .sheet{
    background:var(--paper);width:100%;max-width:560px;border-radius:22px 22px 0 0;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 30px rgba(0,0,0,.25);animation:up .25s ease;
  }
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .sheet .grip{width:42px;height:5px;background:var(--line);border-radius:3px;margin:0 auto 16px;}

  .verdict{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;margin-bottom:14px;}
  .verdict .badge{font-size:13px;padding:5px 10px;border-radius:20px;font-weight:700;}
  .badge.read{background:var(--seal);color:#fff;}
  .badge.newb{background:var(--ok);color:#fff;}

  .bookrow{display:flex;gap:14px;}
  .cover{
    width:82px;height:118px;border-radius:8px;object-fit:cover;flex-shrink:0;
    background:var(--shelf);box-shadow:0 3px 8px rgba(0,0,0,.15);
  }
  .cover.ph{display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:30px;}
  .binfo{flex:1;min-width:0;}
  .btitle{font-size:18px;font-weight:800;line-height:1.3;}
  .bauthor{color:var(--ink-soft);font-size:14px;margin-top:4px;}
  .bisbn{color:var(--ink-soft);font-size:12px;margin-top:6px;font-family:ui-monospace,monospace;}

  .prevlog{margin-top:16px;padding:14px;background:#fff;border:1.5px solid var(--line);border-radius:14px;}
  .prevlog .lbl{font-size:12px;color:var(--seal);font-weight:700;letter-spacing:.05em;}
  .prevlog ul{margin:8px 0 0;padding:0;list-style:none;}
  .prevlog li{font-size:15px;padding:4px 0;border-bottom:1px dashed var(--line);}
  .prevlog li:last-child{border:none;}
  .prevlog .ago{color:var(--ink-soft);font-size:13px;margin-left:6px;}

  .actions{display:flex;gap:10px;margin-top:18px;}
  .actions button{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-ghost{background:transparent;border:1.5px solid var(--line)!important;color:var(--ink-soft);}

  /* 서가(히스토리) */
  .shelf-head{display:flex;align-items:baseline;justify-content:space-between;margin:30px 2px 12px;}
  .shelf-head h2{font-size:20px;margin:0;font-weight:800;}
  .shelf-head .count{color:var(--ink-soft);font-size:14px;}

  .filter{display:flex;gap:8px;margin-bottom:16px;}
  .filter input{
    flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;
    padding:11px 14px;font-size:15px;font-family:inherit;
  }
  .filter input:focus{outline:none;border-color:var(--seal);}

  .empty{text-align:center;color:var(--ink-soft);padding:40px 20px;line-height:1.6;}
  .empty .big{font-size:40px;margin-bottom:10px;}

  .card{
    background:#fff;border:1.5px solid var(--line);border-radius:16px;
    padding:14px;margin-bottom:12px;display:flex;gap:14px;position:relative;
  }
  .card .cover{width:64px;height:92px;font-size:24px;}
  .card .btitle{font-size:16px;}
  .card .times{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
  .card .chip{
    font-size:12px;background:var(--shelf);color:var(--ink-soft);
    padding:4px 9px;border-radius:20px;font-weight:600;
  }
  .card .chip.first{background:var(--seal);color:#fff;}
  .card .del{
    position:absolute;top:10px;right:10px;width:30px;height:30px;border:none;
    background:transparent;color:var(--line);font-size:20px;cursor:pointer;
  }
  .card .del:active{color:var(--seal);}
  .card .again{
    position:absolute;bottom:14px;right:12px;font-size:13px;font-weight:700;
    border:1.5px solid var(--line);background:#fff;color:var(--ink);
    border-radius:20px;padding:6px 12px;font-family:inherit;cursor:pointer;
  }

  .toast{
    position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:13px 20px;border-radius:30px;
    font-size:15px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:200;
    box-shadow:0 6px 20px rgba(0,0,0,.3);white-space:nowrap;
  }
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

  .spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">읽은 책 다시 만나기</div>
    <h1>다시읽기 <span class="stamp">讀</span></h1>
    <p class="sub">책 뒤표지 바코드를 비추면 제목을 찾아주고,<br>예전에 읽었던 책이면 언제 읽었는지 알려줘요.</p>
    <button class="scanbtn" id="scanBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      바코드 스캔하기
    </button>
    <div class="manual">
      <input id="manualIsbn" inputmode="numeric" placeholder="ISBN 직접 입력 (숫자)">
      <button id="manualBtn">찾기</button>
    </div>
  </header>

  <div class="shelf-head">
    <h2>내 서가</h2>
    <span class="count" id="count">0권</span>
  </div>
  <div class="filter">
    <input id="search" placeholder="제목·저자 검색">
  </div>
  <div id="list"></div>
</div>

<!-- 카메라 -->
<div class="cam" id="cam">
  <video id="video" playsinline muted></video>
  <div class="frame"></div>
  <div class="hint">바코드를 네모 안에 맞춰주세요</div>
  <button class="close" id="camClose">✕</button>
</div>

<!-- 결과 시트 -->
<div class="modal" id="modal">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_NAME="dasi-ilki", STORE="books";
let db;

/* ---------- IndexedDB ---------- */
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE,{keyPath:"isbn"});
    };
    r.onsuccess=e=>{db=e.target.result;res();};
    r.onerror=e=>rej(e);
  });
}
function tx(mode){return db.transaction(STORE,mode).objectStore(STORE);}
function getBook(isbn){return new Promise(r=>{const q=tx("readonly").get(isbn);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null);});}
function allBooks(){return new Promise(r=>{const q=tx("readonly").getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>r([]);});}
function putBook(b){return new Promise(r=>{const q=tx("readwrite").put(b);q.onsuccess=()=>r();q.onerror=()=>r();});}
function delBook(isbn){return new Promise(r=>{const q=tx("readwrite").delete(isbn);q.onsuccess=()=>r();q.onerror=()=>r();});}

/* ---------- 책 정보 조회 ---------- */
async function lookup(isbn){
  // 1) Google Books
  try{
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    const j=await r.json();
    if(j.totalItems>0){
      const v=j.items[0].volumeInfo;
      return {
        title:v.title||"제목 미상",
        author:(v.authors||[]).join(", ")||"저자 미상",
        cover:v.imageLinks?(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail).replace("http://","https://"):null
      };
    }
  }catch(e){}
  // 2) OpenLibrary 백업
  try{
    const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);
    const j=await r.json();
    const k=`ISBN:${isbn}`;
    if(j[k]){
      const v=j[k];
      return {
        title:v.title||"제목 미상",
        author:(v.authors||[]).map(a=>a.name).join(", ")||"저자 미상",
        cover:v.cover?v.cover.medium:null
      };
    }
  }catch(e){}
  return null;
}

/* ---------- 날짜 헬퍼 ---------- */
function today(){return new Date().toISOString().slice(0,10);}
function fmt(d){const t=new Date(d+"T00:00");return `${t.getFullYear()}. ${t.getMonth()+1}. ${t.getDate()}.`;}
function ago(d){
  const diff=Math.floor((Date.now()-new Date(d+"T00:00"))/86400000);
  if(diff<=0)return "오늘";
  if(diff===1)return "어제";
  if(diff<30)return `${diff}일 전`;
  if(diff<365)return `${Math.floor(diff/30)}개월 전`;
  return `${Math.floor(diff/365)}년 전`;
}

/* ---------- 처리 흐름 ---------- */
async function handleISBN(raw){
  const isbn=(raw||"").replace(/[^0-9Xx]/g,"");
  if(isbn.length<10){toast("바코드를 인식하지 못했어요");return;}
  showSheetLoading();
  const existing=await getBook(isbn);
  const info=existing || await lookup(isbn);
  if(!info){
    renderSheet({isbn,title:"정보를 찾지 못한 책",author:"",cover:null,dates:[]},null);
    return;
  }
  renderSheet({
    isbn,
    title:info.title,
    author:info.author,
    cover:info.cover,
    dates: existing ? existing.dates : []
  }, existing);
}

/* ---------- 결과 시트 렌더 ---------- */
function showSheetLoading(){
  sheet.innerHTML=`<div class="grip"></div>
    <div style="text-align:center;padding:30px;color:var(--ink-soft)">
      <div class="spin" style="border-color:rgba(0,0,0,.15);border-top-color:var(--ink);margin:0 auto 12px"></div>
      책을 찾는 중…</div>`;
  modal.classList.add("on");
}

function renderSheet(b, existing){
  const isRead = existing && existing.dates.length>0;
  const cover=b.cover
    ? `<img class="cover" src="${b.cover}" onerror="this.classList.add('ph');this.replaceWith(Object.assign(document.createElement('div'),{className:'cover ph',textContent:'📖'}))">`
    : `<div class="cover ph">📖</div>`;

  let prev="";
  if(isRead){
    const sorted=[...existing.dates].sort().reverse();
    const last=sorted[0];
    prev=`<div class="prevlog">
      <div class="lbl">📌 이미 읽었던 책이에요</div>
      <ul>${sorted.map((d,i)=>`<li>${fmt(d)}<span class="ago">${ago(d)}${i===sorted.length-1?" · 처음 읽음":""}</span></li>`).join("")}</ul>
    </div>`;
  }

  sheet.innerHTML=`
    <div class="grip"></div>
    <div class="verdict">
      ${isRead?'<span class="badge read">읽은 책</span>':'<span class="badge newb">새로운 책</span>'}
      ${isRead?`마지막: ${ago([...existing.dates].sort().reverse()[0])}`:'처음 만나는 책!'}
    </div>
    <div class="bookrow">
      ${cover}
      <div class="binfo">
        <div class="btitle">${esc(b.title)}</div>
        ${b.author?`<div class="bauthor">${esc(b.author)}</div>`:""}
        <div class="bisbn">ISBN ${b.isbn}</div>
      </div>
    </div>
    ${prev}
    <div class="actions">
      <button class="btn-ghost" id="cancelBtn">닫기</button>
      <button class="btn-primary" id="saveBtn">${isRead?'오늘 또 읽음 기록':'읽음 기록하기'}</button>
    </div>`;

  document.getElementById("cancelBtn").onclick=closeModal;
  document.getElementById("saveBtn").onclick=async()=>{
    const rec = existing || {isbn:b.isbn,title:b.title,author:b.author,cover:b.cover,dates:[]};
    const t=today();
    if(rec.dates.includes(t)){toast("오늘 이미 기록했어요");closeModal();return;}
    rec.dates.push(t);
    // 최신 메타로 갱신
    rec.title=b.title;rec.author=b.author;rec.cover=b.cover;
    await putBook(rec);
    closeModal();
    toast(existing?"다시 읽음으로 기록했어요":"서가에 담았어요");
    render();
  };
  modal.classList.add("on");
}

function closeModal(){modal.classList.remove("on");}

/* ---------- 서가 렌더 ---------- */
async function render(){
  const books=await allBooks();
  const q=document.getElementById("search").value.trim().toLowerCase();
  document.getElementById("count").textContent=books.length+"권";
  const filtered=books.filter(b=>!q||b.title.toLowerCase().includes(q)||(b.author||"").toLowerCase().includes(q))
    .sort((a,b)=>Math.max(...b.dates.map(d=>+new Date(d)))-Math.max(...a.dates.map(d=>+new Date(d))));

  const list=document.getElementById("list");
  if(books.length===0){
    list.innerHTML=`<div class="empty"><div class="big">📚</div>아직 기록된 책이 없어요.<br>바코드를 스캔해 첫 책을 담아보세요.</div>`;return;
  }
  if(filtered.length===0){list.innerHTML=`<div class="empty">검색 결과가 없어요.</div>`;return;}

  list.innerHTML=filtered.map(b=>{
    const cover=b.cover
      ?`<img class="cover" src="${b.cover}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'cover ph',textContent:'📖'}))">`
      :`<div class="cover ph">📖</div>`;
    const sorted=[...b.dates].sort();
    const chips=sorted.map((d,i)=>`<span class="chip${i===0?' first':''}">${fmt(d)}${i===0&&sorted.length>1?' · 처음':''}</span>`).join("");
    return `<div class="card">
      ${cover}
      <div class="binfo">
        <div class="btitle">${esc(b.title)}</div>
        ${b.author?`<div class="bauthor">${esc(b.author)}</div>`:""}
        <div class="times">${chips}</div>
      </div>
      <button class="del" data-del="${b.isbn}">✕</button>
      <button class="again" data-again="${b.isbn}">다시 읽음</button>
    </div>`;
  }).join("");

  list.querySelectorAll("[data-del]").forEach(el=>el.onclick=async()=>{
    if(confirm("이 책 기록을 지울까요?")){await delBook(el.dataset.del);render();toast("삭제했어요");}
  });
  list.querySelectorAll("[data-again]").forEach(el=>el.onclick=async()=>{
    const b=await getBook(el.dataset.again);const t=today();
    if(b.dates.includes(t)){toast("오늘 이미 기록했어요");return;}
    b.dates.push(t);await putBook(b);render();toast("오늘 다시 읽음!");
  });
}

/* ---------- 카메라 스캔 ---------- */
let codeReader, scanning=false;
async function startScan(){
  if(!window.ZXing){toast("스캐너 로딩 중… 잠시 후 다시");return;}
  cam.classList.add("on");scanning=true;
  codeReader=new ZXing.BrowserMultiFormatReader();
  try{
    await codeReader.decodeFromConstraints(
      {video:{facingMode:{ideal:"environment"}}},
      "video",
      (result,err)=>{
        if(result&&scanning){
          scanning=false;
          if(navigator.vibrate)navigator.vibrate(60);
          stopScan();
          handleISBN(result.getText());
        }
      });
  }catch(e){
    stopScan();
    toast("카메라를 열 수 없어요. 권한을 확인해주세요");
  }
}
function stopScan(){
  scanning=false;cam.classList.remove("on");
  try{codeReader&&codeReader.reset();}catch(e){}
}

/* ---------- 유틸 ---------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("on"),2200);
}

/* ---------- 이벤트 ---------- */
const cam=document.getElementById("cam"),modal=document.getElementById("modal"),sheet=document.getElementById("sheet");
document.getElementById("scanBtn").onclick=startScan;
document.getElementById("camClose").onclick=stopScan;
document.getElementById("manualBtn").onclick=()=>{const v=document.getElementById("manualIsbn").value;if(v)handleISBN(v);document.getElementById("manualIsbn").value="";};
document.getElementById("manualIsbn").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("manualBtn").click();});
document.getElementById("search").addEventListener("input",render);
modal.addEventListener("click",e=>{if(e.target===modal)closeModal();});

/* ---------- 시작 ---------- */
(async()=>{await openDB();render();})();
</script>
</body>
</html>
