<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>독서 기록 · 다시 읽은 책 확인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  /* ===== KRDS Design Tokens ===== */
  :root{
    --primary-5:#e8f1ff; --primary-10:#cfe4ff;
    --primary-50:#256ef4; --primary-60:#0b50d0; --primary-70:#083ba0;
    --gray-0:#ffffff; --gray-5:#f4f5f6; --gray-10:#e6e8ea; --gray-20:#cdd1d5;
    --gray-30:#b1b8be; --gray-40:#8a949e; --gray-50:#58616a; --gray-70:#33363d; --gray-90:#1e2124;
    --danger-5:#fdeeee; --danger-50:#de3730;
    --success-5:#eaf5ec; --success-50:#288741;
    --bg:var(--gray-0); --surface:var(--gray-0); --surface-alt:var(--gray-5);
    --text-strong:var(--gray-90); --text:var(--gray-70); --text-weak:var(--gray-50);
    --text-disabled:var(--gray-40); --border:var(--gray-20); --border-weak:var(--gray-10);
    --action:var(--primary-50); --action-hover:var(--primary-60);
    --r-sm:6px; --r-md:8px; --r-lg:12px;
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:600px;margin:0 auto;padding:0 var(--s4) 120px;}

  .gov-bar{display:flex;align-items:center;gap:var(--s2);padding:var(--s3) 0 var(--s2);
    border-bottom:1px solid var(--border-weak);font-size:12px;color:var(--text-weak);font-weight:600;}
  .gov-bar .dot{width:16px;height:16px;border-radius:50%;background:var(--action);flex-shrink:0;}

  header{padding:var(--s5) 0 var(--s4);}
  .eyebrow{font-size:13px;font-weight:700;color:var(--action);letter-spacing:-.01em;}
  h1{font-size:26px;line-height:1.3;margin:var(--s2) 0;font-weight:700;color:var(--text-strong);letter-spacing:-.02em;}
  .lead{font-size:15px;color:var(--text-weak);line-height:1.6;}

  .action-zone{margin-top:var(--s5);}
  .btn{display:flex;align-items:center;justify-content:center;gap:var(--s2);width:100%;
    border:none;cursor:pointer;font-family:inherit;font-size:17px;font-weight:700;
    border-radius:var(--r-md);padding:16px;transition:background .12s;}
  .btn-primary{background:var(--action);color:#fff;height:60px;}
  .btn-primary:active{background:var(--action-hover);}
  .btn-primary svg{width:22px;height:22px;}

  .divider{display:flex;align-items:center;gap:var(--s3);margin:var(--s4) 0;color:var(--text-disabled);font-size:13px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border-weak);}

  .field{display:flex;gap:var(--s2);}
  .field label{position:absolute;left:-9999px;}
  .field input{flex:1;height:52px;border:1px solid var(--border);background:var(--surface);
    border-radius:var(--r-md);padding:0 var(--s4);font-size:16px;font-family:inherit;color:var(--text-strong);}
  .field input::placeholder{color:var(--text-disabled);}
  .field input:focus{outline:2px solid var(--action);outline-offset:-1px;border-color:var(--action);}
  .btn-line{border:1px solid var(--gray-40);background:var(--surface);color:var(--text);
    border-radius:var(--r-md);padding:0 var(--s5);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;height:52px;flex-shrink:0;}
  .btn-line:active{background:var(--surface-alt);}

  .settings-toggle{display:flex;align-items:center;gap:6px;margin-top:var(--s4);background:none;border:none;color:var(--text-weak);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:4px 0;}
  .settings-toggle svg{width:15px;height:15px;}
  .settings-panel{display:none;margin-top:var(--s3);padding:var(--s4);background:var(--surface-alt);border:1px solid var(--border-weak);border-radius:var(--r-md);}
  .settings-panel.on{display:block;}
  .settings-desc{font-size:13px;color:var(--text-weak);line-height:1.6;margin:0 0 var(--s3);}
  .settings-status{font-size:12px;margin:var(--s2) 0 0;font-weight:600;min-height:16px;}
  .settings-status.ok{color:var(--success-50);}
  .settings-status.no{color:var(--text-disabled);}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin:var(--s6) 0 var(--s4);
    padding-bottom:var(--s3);border-bottom:2px solid var(--text-strong);}
  .sec-head h2{font-size:19px;font-weight:700;color:var(--text-strong);margin:0;letter-spacing:-.01em;}
  .sec-head .count{font-size:13px;font-weight:700;color:var(--action);background:var(--primary-5);padding:3px 10px;border-radius:20px;}

  .search{position:relative;margin-bottom:var(--s4);}
  .search input{width:100%;height:48px;border:1px solid var(--border);border-radius:var(--r-md);
    padding:0 var(--s4) 0 42px;font-size:15px;font-family:inherit;color:var(--text-strong);}
  .search input:focus{outline:2px solid var(--action);outline-offset:-1px;border-color:var(--action);}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-disabled);}

  .empty{text-align:center;padding:var(--s6) var(--s4);color:var(--text-weak);
    border:1px dashed var(--border);border-radius:var(--r-lg);background:var(--surface-alt);}
  .empty svg{width:40px;height:40px;color:var(--text-disabled);margin-bottom:var(--s3);}
  .empty p{margin:0;font-size:15px;line-height:1.6;}

  .card{display:flex;gap:var(--s4);padding:var(--s4);margin-bottom:var(--s3);background:var(--surface);
    border:1px solid var(--border-weak);border-radius:var(--r-lg);position:relative;}
  .cover{width:60px;height:86px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;
    background:var(--surface-alt);border:1px solid var(--border-weak);}
  .cover.ph{display:flex;align-items:center;justify-content:center;color:var(--text-disabled);}
  .cover.ph svg{width:26px;height:26px;}
  .binfo{flex:1;min-width:0;padding-right:var(--s5);}
  .btitle{font-size:16px;font-weight:700;color:var(--text-strong);line-height:1.35;letter-spacing:-.01em;}
  .bauthor{font-size:13px;color:var(--text-weak);margin-top:var(--s1);}
  .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:var(--s3);}
  .rcount{font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r-sm);background:var(--primary-5);color:var(--primary-60);}
  .rcount.multi{background:var(--danger-5);color:var(--danger-50);}
  .chip{font-size:12px;padding:3px 9px;border-radius:var(--r-sm);background:var(--surface-alt);color:var(--text-weak);font-weight:500;}
  .chip.first{background:var(--gray-90);color:#fff;}
  .card-del{position:absolute;top:var(--s3);right:var(--s3);width:28px;height:28px;border:none;
    background:transparent;color:var(--text-disabled);cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);}
  .card-del:active{background:var(--danger-5);color:var(--danger-50);}
  .card-del svg{width:16px;height:16px;}
  .card-again{position:absolute;bottom:var(--s4);right:var(--s4);font-size:13px;font-weight:600;color:var(--action);
    border:1px solid var(--border);background:var(--surface);border-radius:20px;padding:6px 13px;font-family:inherit;cursor:pointer;}
  .card-again:active{background:var(--primary-5);}

  .cam{position:fixed;inset:0;background:#000;z-index:100;display:none;}
  .cam.on{display:block;}
  .cam video{width:100%;height:100%;object-fit:cover;}
  .cam .frame{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);width:80%;max-width:380px;height:140px;
    border-radius:var(--r-md);box-shadow:0 0 0 100vmax rgba(0,0,0,.6);border:2px solid #fff;}
  .cam .corner{position:absolute;width:22px;height:22px;border:3px solid var(--action);}
  .cam .corner.tl{top:-2px;left:-2px;border-right:none;border-bottom:none;border-radius:var(--r-md) 0 0 0;}
  .cam .corner.tr{top:-2px;right:-2px;border-left:none;border-bottom:none;border-radius:0 var(--r-md) 0 0;}
  .cam .corner.bl{bottom:-2px;left:-2px;border-right:none;border-top:none;border-radius:0 0 0 var(--r-md);}
  .cam .corner.br{bottom:-2px;right:-2px;border-left:none;border-top:none;border-radius:0 0 var(--r-md) 0;}
  .cam .laser{position:absolute;left:6%;right:6%;top:50%;height:2px;background:var(--action);box-shadow:0 0 10px var(--action);animation:scan 2.2s ease-in-out infinite;}
  @keyframes scan{0%,100%{top:18%}50%{top:82%}}
  .cam .cam-hint{position:absolute;bottom:120px;left:0;right:0;text-align:center;color:#fff;font-size:15px;font-weight:600;padding:0 30px;}
  .cam .cam-close{position:absolute;top:calc(env(safe-area-inset-top) + var(--s4));right:var(--s4);width:44px;height:44px;
    border-radius:var(--r-md);border:none;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cam .cam-close svg{width:22px;height:22px;}

  .modal{position:fixed;inset:0;z-index:120;display:none;align-items:flex-end;justify-content:center;background:rgba(30,33,36,.45);}
  .modal.on{display:flex;}
  .sheet{background:var(--surface);width:100%;max-width:600px;border-radius:var(--r-lg) var(--r-lg) 0 0;
    padding:var(--s4) var(--s4) calc(var(--s5) + env(safe-area-inset-bottom));animation:rise .22s ease-out;max-height:90vh;overflow-y:auto;}
  @keyframes rise{from{transform:translateY(30px)}to{transform:none}}
  .grip{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto var(--s4);}

  .result-status{display:flex;align-items:center;gap:var(--s2);padding:var(--s3) var(--s4);border-radius:var(--r-md);margin-bottom:var(--s4);font-weight:700;font-size:15px;}
  .result-status svg{width:20px;height:20px;flex-shrink:0;}
  .status-read{background:var(--danger-5);color:var(--danger-50);}
  .status-new{background:var(--success-5);color:var(--success-50);}

  .result-book{display:flex;gap:var(--s4);}
  .result-book .cover{width:76px;height:110px;}
  .result-book .btitle{font-size:18px;}
  .result-isbn{font-size:12px;color:var(--text-disabled);margin-top:var(--s2);font-variant-numeric:tabular-nums;}

  .history-box{margin-top:var(--s4);border:1px solid var(--border-weak);border-radius:var(--r-md);overflow:hidden;}
  .history-box .hb-head{background:var(--surface-alt);padding:var(--s3) var(--s4);font-size:13px;font-weight:700;color:var(--text-strong);display:flex;align-items:center;gap:6px;}
  .history-box .hb-head svg{width:16px;height:16px;color:var(--danger-50);}
  .history-box ul{margin:0;padding:0;list-style:none;}
  .history-box li{display:flex;justify-content:space-between;align-items:center;padding:var(--s3) var(--s4);border-top:1px solid var(--border-weak);font-size:14px;}
  .history-box li .date{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums;}
  .history-box li .rel{color:var(--text-weak);font-size:13px;}
  .history-box li .rel.first-tag{color:var(--action);font-weight:600;}

  .sheet-actions{display:flex;gap:var(--s2);margin-top:var(--s5);}
  .sheet-actions .btn{height:54px;font-size:16px;}
  .btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text);}
  .btn-ghost:active{background:var(--surface-alt);}

  .toast{position:fixed;left:50%;bottom:calc(var(--s5) + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(16px);
    background:var(--gray-90);color:#fff;padding:13px 20px;border-radius:var(--r-md);font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.22s;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:nowrap;display:flex;align-items:center;gap:8px;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast svg{width:18px;height:18px;flex-shrink:0;}

  .spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--action);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="gov-bar"><span class="dot"></span>독서 기록 서비스</div>

  <header>
    <div class="eyebrow">읽은 책 다시 확인</div>
    <h1>이 책, 전에 읽었을까?</h1>
    <p class="lead">책 뒤표지의 바코드를 스캔하면 제목을 찾아드립니다.<br>예전에 읽은 책이라면 언제 읽었는지 알려드려요.</p>

    <div class="action-zone">
      <button class="btn btn-primary" id="scanBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 8v8M11 8v8M15 8v8"/></svg>
        바코드 스캔하기
      </button>
      <div class="divider">또는 직접 입력</div>
      <div class="field">
        <label for="manualIsbn">ISBN 번호</label>
        <input id="manualIsbn" inputmode="numeric" placeholder="ISBN 숫자 입력">
        <button class="btn-line" id="manualBtn">찾기</button>
      </div>

      <button class="settings-toggle" id="settingsToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        국내서 조회 설정 (국립중앙도서관 인증키)
      </button>
      <div class="settings-panel" id="settingsPanel">
        <p class="settings-desc">국내 도서를 조회하려면 국립중앙도서관 무료 인증키가 필요합니다. 발급받은 키를 입력하면 이 기기에 저장됩니다.</p>
        <div class="field">
          <input id="nlKeyInput" type="text" placeholder="발급받은 cert_key 입력">
          <button class="btn-line" id="nlKeySave">저장</button>
        </div>
        <p class="settings-status" id="nlKeyStatus"></p>
      </div>
    </div>
  </header>

  <div class="sec-head">
    <h2>내 서가</h2>
    <span class="count" id="count">0권</span>
  </div>
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" placeholder="제목 또는 저자 검색">
  </div>
  <div id="list"></div>
</div>

<div class="cam" id="cam">
  <video id="video" playsinline muted></video>
  <div class="frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <span class="laser"></span>
  </div>
  <div class="cam-hint">바코드를 사각형 안에 맞춰주세요</div>
  <button class="cam-close" id="camClose">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const DB_NAME="reading-log-krds", STORE="books";
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);
  r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:"isbn"});};
  r.onsuccess=e=>{db=e.target.result;res();};r.onerror=rej;});}
function store(m){return db.transaction(STORE,m).objectStore(STORE);}
function getBook(isbn){return new Promise(r=>{const q=store("readonly").get(isbn);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null);});}
function allBooks(){return new Promise(r=>{const q=store("readonly").getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>r([]);});}
function putBook(b){return new Promise(r=>{const q=store("readwrite").put(b);q.onsuccess=r;q.onerror=r;});}
function delBook(isbn){return new Promise(r=>{const q=store("readwrite").delete(isbn);q.onsuccess=r;q.onerror=r;});}

/* 국립중앙도서관 Seoji 인증키 (브라우저에 저장) */
function nlKey(){return localStorage.getItem("nl_cert_key")||"";}
function setNlKey(k){localStorage.setItem("nl_cert_key",k.trim());}

/* 국내서: 국립중앙도서관 Seoji ISBN 서지정보 */
async function lookupNL(isbn){
  const key=nlKey();
  if(!key)return null;
  try{
    const url=`https://www.nl.go.kr/seoji/SearchApi.do?cert_key=${key}&result_style=json&page_no=1&page_size=1&isbn=${isbn}`;
    const r=await fetch(url);
    const j=await r.json();
    const doc=(j.docs&&j.docs[0])||null;
    if(doc&&doc.TITLE){
      return {
        title:doc.TITLE.trim(),
        author:(doc.AUTHOR||"").replace(/지음|옮김|저$/g,"").trim()||"저자 미상",
        cover:doc.TITLE_URL||null  // 표지 이미지 URL(있을 때만)
      };
    }
  }catch(e){}
  return null;
}

/* 외서: Google Books → OpenLibrary */
async function lookupIntl(isbn){
  try{const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);const j=await r.json();
    if(j.totalItems>0){const v=j.items[0].volumeInfo;
      return {title:v.title||"제목 미상",author:(v.authors||[]).join(", ")||"저자 미상",
        cover:v.imageLinks?(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail).replace("http://","https://"):null};}
  }catch(e){}
  try{const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);const j=await r.json();const k=`ISBN:${isbn}`;
    if(j[k]){const v=j[k];return {title:v.title||"제목 미상",author:(v.authors||[]).map(a=>a.name).join(", ")||"저자 미상",cover:v.cover?v.cover.medium:null};}
  }catch(e){}
  return null;
}

async function lookup(isbn){
  // 국내서(978-89, 979-11)는 국립중앙도서관을 먼저, 그다음 국제 소스
  const isKorean=/^(97889|97911)/.test(isbn);
  if(isKorean){
    return (await lookupNL(isbn)) || (await lookupIntl(isbn));
  }
  return (await lookupIntl(isbn)) || (await lookupNL(isbn));
}

function today(){return new Date().toISOString().slice(0,10);}
function fmt(d){const t=new Date(d+"T00:00");return `${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,"0")}.${String(t.getDate()).padStart(2,"0")}`;}
function ago(d){const diff=Math.floor((Date.now()-new Date(d+"T00:00"))/86400000);
  if(diff<=0)return "오늘";if(diff===1)return "어제";if(diff<30)return `${diff}일 전`;
  if(diff<365)return `${Math.floor(diff/30)}개월 전`;return `${Math.floor(diff/365)}년 전`;}

const ICON={
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'
};

async function handleISBN(raw){
  const isbn=(raw||"").replace(/[^0-9Xx]/g,"");
  if(isbn.length<10){toast("바코드를 인식하지 못했어요",ICON.alert);return;}
  showLoading();
  const existing=await getBook(isbn);
  const info=existing || await lookup(isbn);
  if(!info){renderSheet({isbn,title:"책 정보를 찾지 못했어요",author:"",cover:null},null);return;}
  renderSheet({isbn,title:info.title,author:info.author,cover:info.cover},existing);
}
function showLoading(){sheet.innerHTML=`<div class="grip"></div><div style="text-align:center;padding:32px 0;color:var(--text-weak)"><div class="spinner" style="margin:0 auto 12px"></div>책을 찾는 중입니다</div>`;modal.classList.add("on");}
function coverHTML(url,cls){if(url)return `<img class="cover ${cls||''}" src="${url}" onerror="this.outerHTML='<div class=\\'cover ${cls||''} ph\\'>${ICON.book}</div>'">`;return `<div class="cover ${cls||''} ph">${ICON.book}</div>`;}

function renderSheet(b,existing){
  const dates=existing?[...existing.dates].sort():[];const isRead=dates.length>0;
  let history="";
  if(isRead){const desc=[...dates].reverse();
    history=`<div class="history-box"><div class="hb-head">${ICON.clock} 읽은 날짜 기록</div><ul>${desc.map((d,i)=>{
      const first=(i===desc.length-1);return `<li><span class="date">${fmt(d)}</span><span class="rel${first?' first-tag':''}">${ago(d)}${first?' · 처음 읽음':''}</span></li>`;}).join("")}</ul></div>`;}
  const status=isRead
    ?`<div class="result-status status-read">${ICON.alert}이미 읽었던 책입니다 · 마지막 ${ago(dates[dates.length-1])}</div>`
    :`<div class="result-status status-new">${ICON.check}처음 기록하는 책입니다</div>`;
  sheet.innerHTML=`<div class="grip"></div>${status}
    <div class="result-book">${coverHTML(b.cover)}
      <div class="binfo"><div class="btitle">${esc(b.title)}</div>${b.author?`<div class="bauthor">${esc(b.author)}</div>`:""}<div class="result-isbn">ISBN ${b.isbn}</div></div></div>
    ${history}
    <div class="sheet-actions"><button class="btn btn-ghost" id="cancelBtn">닫기</button><button class="btn btn-primary" id="saveBtn">${isRead?'오늘 또 읽음 기록':'읽음으로 기록'}</button></div>`;
  document.getElementById("cancelBtn").onclick=closeModal;
  document.getElementById("saveBtn").onclick=async()=>{
    const rec=existing||{isbn:b.isbn,title:b.title,author:b.author,cover:b.cover,dates:[]};const t=today();
    if(rec.dates.includes(t)){toast("오늘 이미 기록했어요",ICON.alert);closeModal();return;}
    rec.dates.push(t);rec.title=b.title;rec.author=b.author;rec.cover=b.cover;
    await putBook(rec);closeModal();toast(existing?"다시 읽음으로 기록했어요":"서가에 추가했어요",ICON.check);render();};
  modal.classList.add("on");
}
function closeModal(){modal.classList.remove("on");}

async function render(){
  const books=await allBooks();const q=document.getElementById("search").value.trim().toLowerCase();
  document.getElementById("count").textContent=books.length+"권";
  const filtered=books.filter(b=>!q||b.title.toLowerCase().includes(q)||(b.author||"").toLowerCase().includes(q))
    .sort((a,b)=>Math.max(...b.dates.map(d=>+new Date(d)))-Math.max(...a.dates.map(d=>+new Date(d))));
  const list=document.getElementById("list");
  if(books.length===0){list.innerHTML=`<div class="empty">${ICON.book}<p>아직 기록된 책이 없습니다.<br>바코드를 스캔해 첫 책을 담아보세요.</p></div>`;return;}
  if(filtered.length===0){list.innerHTML=`<div class="empty"><p>검색 결과가 없습니다.</p></div>`;return;}
  list.innerHTML=filtered.map(b=>{
    const sorted=[...b.dates].sort();const n=sorted.length;
    const rc=`<span class="rcount${n>1?' multi':''}">${n>1?`${n}번 읽음`:'1번 읽음'}</span>`;
    const chips=sorted.map((d,i)=>`<span class="chip${i===0?' first':''}">${fmt(d)}</span>`).join("");
    return `<div class="card">${coverHTML(b.cover)}
      <div class="binfo"><div class="btitle">${esc(b.title)}</div>${b.author?`<div class="bauthor">${esc(b.author)}</div>`:""}<div class="badge-row">${rc}${chips}</div></div>
      <button class="card-del" data-del="${b.isbn}" aria-label="삭제">${ICON.x}</button>
      <button class="card-again" data-again="${b.isbn}">다시 읽음</button></div>`;
  }).join("");
  list.querySelectorAll("[data-del]").forEach(el=>el.onclick=async()=>{if(confirm("이 책의 기록을 삭제할까요?")){await delBook(el.dataset.del);render();toast("삭제했어요",ICON.check);}});
  list.querySelectorAll("[data-again]").forEach(el=>el.onclick=async()=>{const b=await getBook(el.dataset.again);const t=today();
    if(b.dates.includes(t)){toast("오늘 이미 기록했어요",ICON.alert);return;}b.dates.push(t);await putBook(b);render();toast("오늘 다시 읽음으로 기록했어요",ICON.check);});
}

let codeReader,scanning=false;
async function startScan(){
  if(!window.ZXing){toast("스캐너를 불러오는 중입니다",ICON.clock);return;}
  cam.classList.add("on");scanning=true;codeReader=new ZXing.BrowserMultiFormatReader();
  try{await codeReader.decodeFromConstraints({video:{facingMode:{ideal:"environment"}}},"video",(result)=>{
    if(result&&scanning){scanning=false;if(navigator.vibrate)navigator.vibrate(60);stopScan();handleISBN(result.getText());}});
  }catch(e){stopScan();toast("카메라를 열 수 없어요. 권한을 확인해주세요",ICON.alert);}
}
function stopScan(){scanning=false;cam.classList.remove("on");try{codeReader&&codeReader.reset();}catch(e){}}

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let toastTimer;
function toast(msg,icon){const t=document.getElementById("toast");t.innerHTML=(icon||"")+`<span>${msg}</span>`;t.classList.add("on");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("on"),2200);}

const cam=document.getElementById("cam"),modal=document.getElementById("modal"),sheet=document.getElementById("sheet");
document.getElementById("scanBtn").onclick=startScan;
document.getElementById("camClose").onclick=stopScan;
document.getElementById("manualBtn").onclick=()=>{const v=document.getElementById("manualIsbn").value;if(v)handleISBN(v);document.getElementById("manualIsbn").value="";};
document.getElementById("manualIsbn").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("manualBtn").click();});
document.getElementById("search").addEventListener("input",render);

/* ---- 국립중앙도서관 인증키 설정 ---- */
function refreshKeyStatus(){
  const s=document.getElementById("nlKeyStatus");
  if(nlKey()){s.textContent="✓ 인증키가 저장되어 국내서 조회가 가능합니다.";s.className="settings-status ok";}
  else{s.textContent="인증키가 없습니다. 국내서는 조회되지 않을 수 있어요.";s.className="settings-status no";}
}
document.getElementById("settingsToggle").onclick=()=>{
  const p=document.getElementById("settingsPanel");p.classList.toggle("on");
  if(p.classList.contains("on")){document.getElementById("nlKeyInput").value=nlKey();refreshKeyStatus();}
};
document.getElementById("nlKeySave").onclick=()=>{
  const v=document.getElementById("nlKeyInput").value.trim();
  if(!v){toast("인증키를 입력하세요",ICON.alert);return;}
  setNlKey(v);refreshKeyStatus();toast("인증키를 저장했어요",ICON.check);
};
modal.addEventListener("click",e=>{if(e.target===modal)closeModal();});
(async()=>{await openDB();render();})();
</script>
